<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF9E6"/><stop offset="100%" stop-color="#FFF3CC"/></linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#hall)"/>
  <!-- Floor -->
  <rect x="0" y="290" width="800" height="90" fill="#D4A96A"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#C09050" stroke-width="1" opacity="0.5"/>
  <!-- Lockers left -->
  <rect x="0" y="40" width="160" height="250" fill="#42A5F5"/>
  <rect x="0" y="40" width="80" height="250" fill="#42A5F5"/>
  <rect x="80" y="40" width="80" height="250" fill="#1E88E5"/>
  <!-- Locker handles and details -->
  <rect x="10" y="50" width="60" height="100" rx="3" fill="#1565C0" opacity="0.3"/>
  <rect x="10" y="160" width="60" height="120" rx="3" fill="#1565C0" opacity="0.3"/>
  <rect x="90" y="50" width="60" height="100" rx="3" fill="#1565C0" opacity="0.3"/>
  <rect x="90" y="160" width="60" height="120" rx="3" fill="#1565C0" opacity="0.3"/>
  <circle cx="45" cy="130" r="5" fill="#BBDEFB"/>
  <circle cx="125" cy="130" r="5" fill="#BBDEFB"/>
  <circle cx="45" cy="240" r="5" fill="#BBDEFB"/>
  <circle cx="125" cy="240" r="5" fill="#BBDEFB"/>
  <!-- Lockers right -->
  <rect x="640" y="40" width="160" height="250" fill="#EF9A9A"/>
  <rect x="640" y="40" width="80" height="250" fill="#EF9A9A"/>
  <rect x="720" y="40" width="80" height="250" fill="#E57373"/>
  <rect x="650" y="50" width="60" height="100" rx="3" fill="#C62828" opacity="0.3"/>
  <rect x="650" y="160" width="60" height="120" rx="3" fill="#C62828" opacity="0.3"/>
  <rect x="730" y="50" width="60" height="100" rx="3" fill="#C62828" opacity="0.3"/>
  <rect x="730" y="160" width="60" height="120" rx="3" fill="#C62828" opacity="0.3"/>
  <circle cx="685" cy="130" r="5" fill="#FFCDD2"/>
  <circle cx="765" cy="130" r="5" fill="#FFCDD2"/>
  <!-- Bulletin board in middle -->
  <rect x="310" y="50" width="180" height="120" rx="5" fill="#FF8F00"/>
  <rect x="320" y="60" width="160" height="100" rx="3" fill="#FFF9C4"/>
  <!-- Papers on board -->
  <rect x="328" y="68" width="65" height="40" rx="2" fill="white"/>
  <rect x="402" y="68" width="65" height="40" rx="2" fill="white"/>
  <rect x="328" y="114" width="65" height="35" rx="2" fill="white"/>
  <rect x="402" y="114" width="65" height="35" rx="2" fill="white"/>
  <!-- Stars on board -->
  <polygon points="360,78 364,90 376,90 366,97 370,109 360,102 350,109 354,97 344,90 356,90" fill="#FFD700" transform="scale(0.6) translate(215,55)"/>
  <!-- Sam - happy, waving (left child) -->
  <circle cx="280" cy="185" r="30" fill="#FFCC80"/>
  <!-- Sam hair -->
  <path d="M 252 178 Q 255 148 280 145 Q 305 148 308 178" fill="#5D4037"/>
  <!-- Sam eyes and smile -->
  <circle cx="270" cy="180" r="5" fill="#333"/>
  <circle cx="290" cy="180" r="5" fill="#333"/>
  <circle cx="268" cy="178" r="2" fill="white"/>
  <circle cx="288" cy="178" r="2" fill="white"/>
  <path d="M 268 193 Q 280 204 292 193" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="260" y="214" width="40" height="60" rx="8" fill="#66BB6A"/>
  <!-- Sam waving arm -->
  <line x1="260" y1="225" x2="225" y2="195" stroke="#66BB6A" stroke-width="14" stroke-linecap="round"/>
  <circle cx="222" cy="193" r="12" fill="#FFCC80"/>
  <line x1="300" y1="228" x2="318" y2="255" stroke="#66BB6A" stroke-width="14" stroke-linecap="round"/>
  <!-- New student - shy but smiling (right child) -->
  <circle cx="520" cy="185" r="30" fill="#FFB74D"/>
  <!-- Student hair -->
  <path d="M 492 178 Q 496 148 520 145 Q 544 148 548 178" fill="#1A237E"/>
  <!-- Student eyes and small smile -->
  <circle cx="510" cy="180" r="5" fill="#333"/>
  <circle cx="530" cy="180" r="5" fill="#333"/>
  <circle cx="508" cy="178" r="2" fill="white"/>
  <circle cx="528" cy="178" r="2" fill="white"/>
  <path d="M 510 193 Q 520 200 530 193" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <rect x="500" y="214" width="40" height="60" rx="8" fill="#CE93D8"/>
  <!-- Student arms holding backpack -->
  <line x1="500" y1="228" x2="482" y2="260" stroke="#CE93D8" stroke-width="14" stroke-linecap="round"/>
  <line x1="540" y1="228" x2="558" y2="255" stroke="#CE93D8" stroke-width="14" stroke-linecap="round"/>
  <!-- Backpack -->
  <rect x="536" y="224" width="32" height="42" rx="6" fill="#F44336"/>
  <rect x="541" y="230" width="22" height="14" rx="3" fill="#D32F2F"/>
  <!-- Small hearts between them -->
  <path d="M 380 195 Q 380 185 390 185 Q 400 185 400 195 Q 400 205 380 215 Q 360 205 360 195 Q 360 185 370 185 Q 380 185 380 195" fill="#FF4081" opacity="0.6" transform="scale(0.5) translate(360,185)"/>
  <path d="M 415 175 Q 415 165 423 165 Q 431 165 431 175 Q 431 183 415 191 Q 399 183 399 175 Q 399 165 407 165 Q 415 165 415 175" fill="#FF4081" opacity="0.5" transform="scale(0.4) translate(430,215)"/>
</svg>