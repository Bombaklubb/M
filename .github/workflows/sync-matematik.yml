name: Sync Mattejakten

on:
  push:
    branches: [main]
    paths:
      - 'matematik/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Bombaklubb
          repositories: mattejakten

      - name: Push to mattejakten
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote add target https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/Bombaklubb/mattejakten.git
          git subtree push --prefix=matematik target main
