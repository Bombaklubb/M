name: Sync Engelskajakten

on:
  push:
    branches: [main]
    paths:
      - 'engelska/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to engelskajakten
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Extract engelska/ as a standalone branch
          git subtree split --prefix=engelska -b engelska-split

          # Clone target repo and force-push
          git remote add target https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/Bombaklubb/engelskajakten.git
          git push target engelska-split:main --force
