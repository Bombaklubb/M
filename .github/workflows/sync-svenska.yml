name: Sync Svenskajakten

on:
  push:
    branches: [main]
    paths:
      - 'svenska/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to svenskajakten
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote add target https://x-access-token:${{ secrets.SVENSKA_TOKEN }}@github.com/Bombaklubb/svenskajakten.git
          git subtree push --prefix=svenska target main
