name: Generate Library Texts

on:
  workflow_dispatch:
    inputs:
      grade:
        description: 'Årskurs (1-9, eller "alla")'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
          - '7'
          - '8'
          - '9'
          - 'alla'
      count:
        description: 'Antal texter'
        required: true
        default: '10'
        type: choice
        options:
          - '5'
          - '10'
          - '15'
          - '20'
          - '25'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set grades parameter
        id: grades
        run: |
          if [ "${{ inputs.grade }}" = "alla" ]; then
            echo "value=1-9" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.grade }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate texts
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🚀 Genererar ${{ inputs.count }} texter för årskurs ${{ steps.grades.outputs.value }}"
          node scripts/generate_library.mjs \
            --grades "${{ steps.grades.outputs.value }}" \
            --count "${{ inputs.count }}" \
            --sleep 500 \
            --out lasforstaelse/public/data/library.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lasforstaelse/public/data/library.json
          if git diff --staged --quiet; then
            echo "Inga ändringar att committa"
          else
            git commit -m "📚 Genererat ${{ inputs.count }} texter för åk ${{ steps.grades.outputs.value }}"
            git push
          fi
